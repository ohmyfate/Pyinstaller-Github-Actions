name: Build and Release Executables

on:
  # push:
  #   branches:
  #     - main  # Runs automatically on every commit to main
  #   tags:
  #     - 'v*'
  workflow_dispatch: # Adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: 
          - windows-latest
          - ubuntu-latest
          - macos-latest

    env:
      MAIN_PY_FILE: 'main.pyw'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.x'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
      working-directory: ./

    - name: Install PyInstaller
      run: |
        pip install pyinstaller
      working-directory: ./

    - name: Build executable
      run: |
        pyinstaller --name "Contract Automation" --icon=icon.ico --clean --onefile ${{ env.MAIN_PY_FILE }}
      working-directory: ./

    - name: Rename Executable for Release
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          mv "dist/Contract Automation.exe" "dist/Contract Automation-${{ matrix.os }}.exe"
        else
          mv "dist/Contract Automation" "dist/Contract Automation-${{ matrix.os }}"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ matrix.os }}
        path: dist/
        compression-level: 0

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release/
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Latest Build' }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist-release/*
